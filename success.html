<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>You're on the list — Fourhands Coffee Co.</title>
    <meta
      name="description"
      content="Thank you for signing up. We'll be in touch soon." />
    <meta
      name="robots"
      content="noindex, nofollow" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body class="success-page">
    <div class="hero">
      <div
        class="hero__bg"
        aria-hidden="true"></div>
      <div
        class="hero__overlay"
        aria-hidden="true"></div>

      <div class="layout">
        <main>
          <div class="content success-content">
            <div class="success-ripple" aria-hidden="true">
              <span class="ripple-drop"></span>
            </div>
            <span class="eyebrow">You're In</span>
            <h1>Thanks for <em>staying close</em>.</h1>
            <div class="story">
              <p>
                We'll drop you a note the moment we're ready — no spam, just
                the good stuff when it matters.
              </p>
            </div>
            <a href="/" class="back-link">&larr; Back</a>
          </div>
        </main>

        <footer>
          <span
            >&copy; 2026
            <a
              href="https://fourhandscoffee.com/"
              style="color: inherit"
              >Fourhands Coffee Co.</a
            >
            — Crafted in Kerala, brewed everywhere.</span
          >
        </footer>
      </div>
